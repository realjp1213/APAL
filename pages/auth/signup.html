<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account - APAL</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../../css/style.css">
</head>

<body>
  <header class="site-header">
    <nav class="nav-bar">
      <a href="../../index.html" class="logo">
        <img src="../../images/logo.png" alt="APAL" class="logo-img">
      </a>
    </nav>
  </header>
  <main class="auth-page">
    <section class="auth-container">
      <div class="auth-card">
        <img src="../../images/logo.png" alt="APAL" class="auth-logo">
        <h1 class="auth-title">Create an APAL account</h1>
        <p class="auth-switch">
          Already have an account? <a href="login.html">Log in</a>
        </p>
        <!-- Google button -->
         <button class="auth-google-btn">
          <img src="../../images/auth-page/google-icon.png" alt="" class="google-icon">
          Continue with Google
        </button>
        <div class="auth-divider">
          <span>or continue with email</span>
        </div>
        <!-- FORM -->
         <form id="signupForm" class="auth-form" novalidate>
          <!-- Email -->
           <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required>
            <p class="form-error" id="emailError"></p>
           </div>
          <!-- Password -->
           <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required>
            <p class="form-helper">
              Use at least 8 characters and 1 number
            </p>
            <p class="form-error" id="passwordError"></p>
          </div>

        <!-- Confirm password -->
        <div class="form-group">
          <label for="confirmPassword">Confirm password</label>
          <input type="password" id="confirmPassword" required>
          <p class="form-error" id="confirmPasswordError"></p>
        </div>

        <!-- GENERAL ERROR -->
        <p class="form-error form-error-global" id="formError"></p>

        <!-- BUTTON -->
        <button type="submit" id="signupBtn" class="auth-submit-btn">
          Create account
        </button>

      </form>

    </div>

  </section>
</main>
<!-- Supabase client library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../../js/signup.js"></script>
</body>
</html>
